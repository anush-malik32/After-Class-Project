<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="myfunction(8)">Execute a JS function with one Undefined Number</button>
    <p id="demo"></p>
    <button onclick="myfunction1(4)">Execute a normal JS function.</button>
    <p id="demo1"></p>
    <script>
        function myfunction(x,y) {
            {
                y=undefined
            }
            document.getElementById("demo").innerHTML = "8 times unefined is " + x*y + " which means not a number";
        }
        function myfunction1(a,b) {
            if (b=== undefined) {
                b = 5;
            }
            document.getElementById("demo1").innerHTML = "4 times 5 is " + a*b;
        }
    </script>
</body>
</html>
