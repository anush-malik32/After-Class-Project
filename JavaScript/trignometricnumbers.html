<html>
<head>
    <title>JavaScript Math Object Methods</title>
</head>
<body>
    <script type="text/javascript">

    var value1 = Math.abs(30);
    document.write("Demo Test Value : " + value1
    + "<br>");

    var value2 = Math.acos(-1);
    document.write("Demo1 Test Value : " + value2
    + "<br>");

    var value3 = Math.asin(1);
    document.write("Demo2 Test Value : " + value3
    + "<br>");

    var value4 = Math.atan(5);
    document.write("Demo3 Test Value : " + value4
    + "<br>");
    document.write("All test values added up : " + (value1 + value2 + value3 + value4))
    </script>
</body>
</html>
