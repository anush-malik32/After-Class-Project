<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#fff6eb;
    text-align:center;
    }

    h1{
        background:#b22222;
        color:white;
        margin:0;
        padding:20px;
        font-size:45px;
        letter-spacing:2px;
    }

    .slideshow{
        width:90%;
        max-width:1200px;
        margin:40px auto;
    }

    .mySlides{
        width:100%;
        height:550px;
        object-fit:cover;
        display:none;
        border-radius:20px;
        box-shadow:0px 8px 20px rgba(0,0,0,.35);
    }
</style>
</head>
<body>
    <section>
        <img class="mySlides" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQjf26gDtChtvmyTrDFqUgA1Jo870qXcylFXdXU8681mw&s=10">
        <img class="mySlides" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQpclqvsYwzbB45QiaZr51NpjHa0-fHZrI8_26-Kw2pKA&s=10">
        <img class="mySlides" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRIH9Zjvfc2Aw9Kcpx41sy8I9Http5uVHn6Jwux04mQHQ&s=10">
        <img class="mySlides" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSKcBcp0tw4asTjv6etVWQ7DfAEFhcd8MxrLc5wuY99_w&s=10">
        <img class="mySlides" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTBMhZ0Xj1Y7TeZdi7lLVHXaOp7tFFmWnxcH5iRch92_w&s=10">
    </section>

    <script>
        var myIndex = 0;
        carousel();

        function carousel() {
        var i;
        var x = document.getElementsByClassName("mySlides");
        for (i = 0; i < x.length; i++) {
            x[i].style.display = "none";
        }
        myIndex++;
        if (myIndex > x.length) {myIndex = 1}
        x[myIndex-1].style.display = "block";
        setTimeout(carousel, 3000);
        }
    </script>
</body>
</html>
