<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container{
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }
        h1{
            margin-bottom: 20px;
            color: #333;
        }
        p{
            font-size: 24px;
            margin: 10px 0;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Today's Date</h1>
        <p id="day"></p>
        <p id="date"></p>
        <p id="month"></p>
        <p id="year"></p>
    </div>
    <script>
        let today = new Date()
        let days = [
            "Sunday",
            "Monday",
            "Tuesday",
            "Wednesday",
            "Thursday",
            "Friday",
            "Saturday"
        ];
        let months = [
            "January",
            "Febuary",
            "March",
            "April",
            "May",
            "June",
            "July",
            "August",
            "September",
            "October",
            "November",
            "December"
        ];
        let day = days[today.getDay()];
        let date = today.getDate();
        let month = months[today.getMonth()];
        let year = today.getFullYear();
        document.getElementById("day").textContent = "Day: " + day;
        document.getElementById("date").textContent = "Date: " + date;
        document.getElementById("month").textContent = "Month: " + month;
        document.getElementById("year").textContent = "Year: " + year;
    </script>
</body>
</html>
